animations:
  # Animation settings for pure window translations (position changes only).
  window_move:
    enabled: true
    duration_ms: 320
    # Easing function. Named options: 'linear', 'ease_in', 'ease_out',
    # 'ease_in_out', 'ease_in_cubic', 'ease_out_cubic', 'ease_in_out_cubic',
    # 'ease_out_spring'. Custom cubic bezier: 'cubic_bezier(x1, y1, x2, y2)'
    # where x1/x2 must be in [0, 1]; y1/y2 may exceed that range for
    # overshoot. Examples:
    #   "cubic_bezier(0.16, 1, 0.3, 1)"  - expo-out (fast start, smooth stop)
    #   "cubic_bezier(0.4, 0, 0.2, 1)"   - Material Design standard
    easing: "cubic_bezier(0.2, 0.0, 0.0, 1.0)"
    # Minimum pixel distance required to trigger movement animations.
    # Helps prevent animations from starting on very small position changes.
    # Increase this value on high-DPI displays to reduce sensitivity.
    # Default: 10
    threshold_px: 10

  # Animation settings for window resize operations.
  # When a single layout change both moves and resizes windows, the moved
  # windows share this resize timing so all edges stay in lock-step.
  window_resize:
    enabled: true
    duration_ms: 320
    # See 'window_move.easing' for available options.
    easing: "cubic_bezier(0.2, 0.0, 0.0, 1.0)"
    # Minimum pixel distance required to trigger resize animations.
    # Default: 10
    threshold_px: 10

  # Animation settings for when a new window appears. Windows only.
  window_open:
    enabled: true
    duration_ms: 320
    # See 'window_move.easing' for available options.
    easing: "cubic_bezier(0.16, 1.0, 0.3, 1.0)"
    # Transition style. Options:
    #   'slide_right' (default) - slides in from the right
    #   'slide_left'            - slides in from the left
    #   'slide_top'             - slides in from the top
    #   'slide_bottom'          - slides in from the bottom
    #   'none' / 'fade'         - no slide; combine with opacity_from for pure fade
    #   'zoom'                  - zoom in from window center
    style: "zoom"
    # Starting opacity (0.0–1.0). At 1.0 no fade is applied; at 0.0 the
    # window fades in from fully transparent. Can be combined with any style.
    opacity_from: 1.0

  # Animation settings for workspace-switch transitions.
  workspace_switch:
    enabled: true
    duration_ms: 380
    # See 'window_move.easing' for available options.
    easing: "ease_out_cubic"
    # Motion style. Options:
    #   'slide' (default) - workspaces slide along the 'direction' axis
    #   'fade'            - pure crossfade; both workspaces stay in place
    #   'zoom'            - outgoing shrinks to monitor center, incoming expands
    #   'iris'            - a frozen snapshot of the old workspace stays on top
    #                       while a circular hole grows from 'iris_origin',
    #                       revealing the new workspace beneath (Windows only)
    style: "slide"
    # Slide axis when type is 'slide'. Options: 'horizontal' (default), 'vertical'.
    direction: "horizontal"
    # Origin of the circle when type is 'iris'. Options:
    #   'center' (default) - grow from the monitor center
    #   'cursor'           - grow from the current mouse-cursor position
    #   'focused_window'   - grow from the center of the newly focused window
    iris_origin: "center"
    # Opacity at the end of the outgoing workspace's exit (0.0–1.0).
    # 1.0 = stays fully opaque (default); 0.0 = fades out to transparent.
    # Combine with opacity_incoming: 0.0 for a crossfade on any style.
    opacity_outgoing: 1.0
    # Opacity at the start of the incoming workspace's entrance (0.0–1.0).
    # 1.0 = starts fully opaque (default); 0.0 = fades in from transparent.
    opacity_incoming: 1.0
    # Amount of workspace-level zoom applied during 'slide' transitions. The
    # outgoing workspace shrinks from 1.0 to (1 - zoom_factor) as it exits;
    # the incoming grows from (1 - zoom_factor) to 1.0. Scaling is from the
    # monitor center so all windows move inward together. Range: 0.0 (no zoom)
    # to 1.0 (collapses to a point). Has no effect on 'fade' or 'zoom' styles.
    zoom_factor: 0.0

  # Animation settings for when a window is closed (Windows only).
  window_close:
    enabled: true
    duration_ms: 150
    # See 'window_move.easing' for available options.
    easing: "ease_in_cubic"
    # Transition style. Options:
    #   'none' / 'fade' (default) - no positional movement; combine with opacity_to for a fade
    #   'zoom'                    - zoom out from window center
    #   'slide_right'             - slide off the right edge
    #   'slide_left'              - slide off the left edge
    #   'slide_top'               - slide off the top edge
    #   'slide_bottom'            - slide off the bottom edge
    style: "zoom"
    # Final opacity (0.0–1.0). At 0.0 the window fades to fully transparent;
    # at 1.0 no fade is applied.
    opacity_to: 0.0

  # Animation settings for when the focused window changes (Windows only).
  focus_change:
    enabled: false
    duration_ms: 150
    # See 'window_move.easing' for available options.
    easing: "cubic_bezier(0.16, 1.0, 0.3, 1.0)"
    # Animation style. Options:
    #   'opacity' (default) - window briefly dims then restores opacity
    #   'scale'             - window briefly pops in from a slightly smaller size
    style: "opacity"
    # For 'opacity' type: dim level at the start of the animation, relative to
    # the effect opacity. E.g. 0.5 = dims to 50% of effect opacity then
    # restores. Range: 0.0–1.0. Default: 0.5.
    opacity_from: 0.5
    # For 'scale' type: ratio of the initial shrunken size relative to the
    # window's actual size. E.g. 0.98 = window starts at 98% and grows to 100%.
    # Range: 0.5–1.0.
    scale_factor: 0.98
    # Which focus changes trigger the animation. Options:
    #   'all'            - animate on all focus changes (keyboard and mouse)
    #   'keyboard_only'  - animate only on keyboard/WM-command focus changes
    trigger: "all"

general:
  startup_commands: ['shell-exec gat-gwm']
  focus_follows_cursor: false
  toggle_workspace_on_refocus: false
  cursor_jump:
    enabled: true
    trigger: "window_focus"
    hide_method: 'cloak'
    show_all_in_taskbar: false
gaps:
  inner_gap: "14px"
  outer_gap:
    top: "12px"
    right: "20px"
    bottom: "20px"
    left: "20px"

window_effects:
  focused_window:
    border:
      enabled: false
      color: "#a6e3a1"
    hide_title_bar:
      enabled: false

  other_windows:
    border:
      enabled: false
      color: "#313244"
    hide_title_bar:
      enabled: false
    transparency:
      enabled: false
      opacity: '94%'
window_behavior:
  initial_state: "tiling"
  state_defaults:
    floating:
      centered: true
      shown_on_top: false
    fullscreen:
      maximized: false
      shown_on_top: false
workspaces:
  - name: "1"
    display_name: "1"
  - name: "2"
    display_name: "2"
  - name: "3"
    display_name: "3"
  - name: "4"
    display_name: "4"
  - name: "5"
    display_name: "5"
  - name: "6"
    display_name: "6"
  - name: "7"
    display_name: "7"
  - name: "8"
    display_name: "8"
  - name: "9"
    display_name: "9"
window_rules:
  - commands: ['ignore']
    match:
      # Ignores any Zebar windows.
      - window_process: { equals: 'zebar' }

      # Ignore PowerToys Command Palette
      - window_title: { equals: 'Command Palette' }
        window_class: { equals: 'WinUIDesktopWin32WindowClass' }

      # Ignore Keyviz
      - window_process: { equals: 'Keyviz.exe' }

      # Ignores picture-in-picture windows for browsers.
      - window_title: { regex: '[Pp]icture.in.[Pp]icture' }
        window_class: { regex: 'Chrome_WidgetWin_1|MozillaDialogClass' }

      # Ignore rules for various 3rd-party apps.
  - commands: ["set-floating"]
    match:
      - window_process: { equals: 'Photoshop' }
        window_class: { not_regex: 'Photoshop' }

      # Ignore child windows from Adobe Illustrator
      - window_process: { equals: 'Illustrator' }
        window_class: { not_regex: 'Illustrator' }

      # Ignore child windows from Adobe After Effects
      - window_process: { equals: 'AfterFX' }
        window_class: { not_regex: 'AfterFX' }

      # Ignore child windows from Adobe Premiere Pro
      - window_process: { equals: 'Adobe Premiere Pro' }
        window_class: { not_regex: 'Premiere Pro' }

      - window_process: { equals: 'PowerToys' }
        window_class: { regex: 'HwndWrapper\[PowerToys\.PowerAccent.*?\]' }
      - window_process: { equals: 'PowerToys' }
        window_title: { regex: '.*? - Peek' }
      - window_process: { equals: 'Lively' }
        window_class: { regex: 'HwndWrapper' }
      - window_process: { equals: 'EXCEL' }
        window_class: { not_regex: 'XLMAIN' }
      - window_process: { equals: 'WINWORD' }
        window_class: { not_regex: 'OpusApp' }
      - window_process: { equals: 'POWERPNT' }
        window_class: { not_regex: 'PPTFrameClass' }
      - window_process: { equals: 'PowerToys' }
    
binding_modes:
  # When enabled, the focused window can be resized via arrow keys or HJKL.
  - name: "resize"
    keybindings:
      - commands: ["resize --width -2%"]
        bindings: ["h", "left"]
      - commands: ["resize --width +2%"]
        bindings: ["l", "right"]
      - commands: ["resize --height +2%"]
        bindings: ["k", "up"]
      - commands: ["resize --height -2%"]
        bindings: ["j", "down"]
      - commands: ["wm-disable-binding-mode --name resize"]
        # Press enter/escape to return to default keybindings.

        bindings: ["escape", "enter"]

  - name: "wm-redraw"
    keybindings:
      - commands: ["wm-redraw"]
        bindings: ["alt+shift+y"]

  - name: "pause"
    # When enabled, all keybindings are disabled except for alt+shift+p which

    # returns to default keybindings.
keybindings:
  # Shift focus in a given direction.
  - commands: ['focus --direction left']
    bindings: ['alt+h', 'alt+left']
  - commands: ['focus --direction right']
    bindings: ['alt+l', 'alt+right']
  - commands: ['focus --direction up']
    bindings: ['alt+k', 'alt+up']
  - commands: ['focus --direction down']
    bindings: ['alt+j', 'alt+down']

  # Move focused window in a given direction.
  - commands: ['move --direction left']
    bindings: ['alt+shift+left']
  - commands: ['move --direction right']
    bindings: ['alt+shift+right']
  - commands: ['move --direction up']
    bindings: ['alt+shift+up']
  - commands: ['move --direction down']
    bindings: ['alt+shift+down']

  # Resize focused window by a percentage or pixel amount.
  - commands: ['resize --width -1%']
    bindings: ['alt+.']
  - commands: ['resize --width +1%']
    bindings: ['alt+,']
  - commands: ['resize --height +1%']
    bindings: ['alt+;']
  - commands: ['resize --height -1%']
    bindings: ['alt+l']

  - commands: ['resize --width -20%']
    bindings: ['alt+shift+.']
  - commands: ['resize --width +20%']
    bindings: ['alt+shift+,']
  - commands: ['resize --height +20%']
    bindings: ['alt+shift+;']
  - commands: ['resize --height -20%']
    bindings: ['alt+shift+l']

  # As an alternative to the resize keybindings above, resize mode enables
  # resizing via arrow keys or HJKL. The binding mode is defined above with
  # the name 'resize'.
  #- commands: ['wm-enable-binding-mode --name resize']
  #  bindings: [' ']

  # Disables window management and all other keybindings until alt+shift+p
  # is pressed again.
  #- commands: ['wm-toggle-pause']
  #  bindings: ['alt+shift+p']

  # Change tiling direction. This determines where new tiling windows will
  # be inserted.
  - commands: ['toggle-tiling-direction']
    bindings: ['alt+v']

  - commands: ['toggle-tiling']
    bindings: ['alt+shift+q']

  # Change focus from tiling windows -> floating -> fullscreen.
  - commands: ['wm-cycle-focus']
    bindings: ['alt+b']

  # Change the focused window to be floating.
  - commands: ['toggle-floating --centered']
    bindings: ['alt+shift+a']

  # Change the focused window to be fullscreen.
  - commands: ['toggle-fullscreen']
    bindings: ['alt+shift+s']

  # Minimize focused window.
  - commands: ['toggle-minimized']
    bindings: ['alt+w']

  # Close focused window.
  - commands: ['close']
    bindings: ['alt+q']

  # Kill GlazeWM process safely.
  #- commands: ['wm-exit']
  #  bindings: ['alt+shift+e']

  # Re-evaluate configuration file.
  - commands: ['wm-reload-config']
    bindings: ['alt+shift+]']

  # Redraw all windows.
  - commands: ['wm-redraw']
    bindings: ['alt+shift+w']

  # Launch CMD terminal. Alternatively, use `shell-exec wt` or
  # `shell-exec %ProgramFiles%/Git/git-bash.exe` to start Windows
  # Terminal and Git Bash respectively.
  - commands: ['shell-exec msedge']
    bindings: ['alt+shift+r']
  - commands: ['shell-exec slidetoshutdown.exe']
    bindings: ['alt+shift+j']
  - commands: ['shell-exec wt']
    bindings: ['alt+shift+e']

  # Focus the next/previous active workspace defined in `workspaces` config.
  - commands: ['focus --next-active-workspace']
    bindings: ['alt+s']
  - commands: ['focus --prev-active-workspace']
    bindings: ['alt+a']

  # Focus the workspace that last had focus.
  #- commands: ['focus --recent-workspace']
  #  bindings: ['alt+d']

  # Change focus to a workspace defined in `workspaces` config.
  - commands: ['focus --workspace 1']
    bindings: ['alt+1']
  - commands: ['focus --workspace 2']
    bindings: ['alt+2']
  - commands: ['focus --workspace 3']
    bindings: ['alt+3']
  - commands: ['focus --workspace 4']
    bindings: ['alt+4']
  - commands: ['focus --workspace 5']
    bindings: ['alt+5']
  - commands: ['focus --workspace 6']
    bindings: ['alt+6']
  - commands: ['focus --workspace 7']
    bindings: ['alt+7']
  - commands: ['focus --workspace 8']
    bindings: ['alt+8']
  - commands: ['focus --workspace 9']
    bindings: ['alt+9']

  # Move the focused window's parent workspace to a monitor in a given
  # direction.
  - commands: ['move-workspace --direction left']
    bindings: ['alt+shift+p']
  - commands: ['move-workspace --direction right']
    bindings: ['alt+shift+f']
  - commands: ['move-workspace --direction up']
    bindings: ['alt+shift+d']
  - commands: ['move-workspace --direction down']
    bindings: ['alt+shift+o']

  # Move focused window to a workspace defined in `workspaces` config.
  - commands: ['move --workspace 1', 'focus --workspace 1']
    bindings: ['alt+shift+1']
  - commands: ['move --workspace 2', 'focus --workspace 2']
    bindings: ['alt+shift+2']
  - commands: ['move --workspace 3', 'focus --workspace 3']
    bindings: ['alt+shift+3']
  - commands: ['move --workspace 4', 'focus --workspace 4']
    bindings: ['alt+shift+4']
  - commands: ['move --workspace 5', 'focus --workspace 5']
    bindings: ['alt+shift+5']
  - commands: ['move --workspace 6', 'focus --workspace 6']
    bindings: ['alt+shift+6']
  - commands: ['move --workspace 7', 'focus --workspace 7']
    bindings: ['alt+shift+7']
  - commands: ['move --workspace 8', 'focus --workspace 8']
    bindings: ['alt+shift+8']
  - commands: ['move --workspace 9', 'focus --workspace 9']
    bindings: ['alt+shift+9']
